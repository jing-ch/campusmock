<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusMock — Find Your Mock Interview Partner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen py-10 px-4">
  <div class="max-w-xl mx-auto bg-white rounded-2xl shadow p-8">

    <h1 class="text-2xl font-bold text-gray-800 mb-1">CampusMock</h1>
    <p class="text-gray-500 mb-8">Find your mock interview partner at NEU Seattle.</p>

    <form id="campusForm" novalidate class="space-y-7">

      <!-- Step 1: Intent only -->
      <div id="stepIntent">
        <label class="label">What are you here for? *</label>
        <div class="space-y-2 mt-1">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="intent" value="I want a mock interview (and I'll join the interviewer pool)"
              class="mt-1" onchange="onIntentChange(true)" />
            <span class="text-gray-700">🙋 I need a mock interview (I'll also join as an interviewer)</span>
          </label>
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="radio" name="intent" value="I only want to be an interviewer candidate"
              class="mt-1" onchange="onIntentChange(false)" />
            <span class="text-gray-700">🤝 I just want to help others — sign me up as an interviewer</span>
          </label>
        </div>
      </div>

      <!-- Step 2: Shared + requester fields, hidden until intent picked -->
      <div id="stepFields" class="hidden space-y-7">

        <!-- Shared fields -->
        <div class="flex gap-3">
          <div class="flex-1">
            <label class="label">First name *</label>
            <input type="text" name="first_name" class="input" />
          </div>
          <div class="flex-1">
            <label class="label">Last name *</label>
            <input type="text" name="last_name" class="input" />
          </div>
        </div>
        <div>
          <label class="label">Email address * <span class="text-gray-400 text-sm">(use Gmail — NEU email will eat our messages 😅)</span></label>
          <input type="email" name="email" placeholder="you@gmail.com" class="input" />
        </div>
        <div>
          <label class="label">College *</label>
          <input type="text" name="college" placeholder="e.g. Khoury College" class="input" />
        </div>
        <div>
          <label class="label">Major *</label>
          <input type="text" name="major" placeholder="e.g. Computer Science" class="input" />
        </div>
        <div>
          <label class="label">When did you enroll? *</label>
          <input type="text" name="enrollment" placeholder="e.g. 2024 Spring" class="input" />
        </div>
        <div>
          <label class="label">Cultural background — we use this for optional matching <span class="text-gray-400 text-sm">(e.g. Chinese, Brazilian, Indian)</span></label>
          <input type="text" name="cultural_background" placeholder="e.g. Chinese, Brazilian, Indian" class="input" />
        </div>
        <div>
          <label class="label">When are you generally free to interview others? *</label>
          <div class="space-y-2 mt-1" id="availability_group">
            <label class="flex items-center gap-2"><input type="checkbox" value="weekday_morning" /> ☀️ Weekday morning (6am–12pm PT)</label>
            <label class="flex items-center gap-2"><input type="checkbox" value="weekday_afternoon" /> 🌤 Weekday afternoon (12pm–5pm PT)</label>
            <label class="flex items-center gap-2"><input type="checkbox" value="weekday_evening" /> 🌙 Weekday evening (5pm–10pm PT)</label>
            <label class="flex items-center gap-2"><input type="checkbox" value="weekend" /> 🗓 Weekend (any time)</label>
          </div>
        </div>
        <div>
          <label class="label">Drop your CV here (PDF only, please 🙏) *</label>
          <input type="file" id="cv_input" accept=".pdf" class="input" />
        </div>

        <!-- Requester-only fields -->
        <div id="requesterFields" class="hidden space-y-7">
          <hr class="border-gray-100" />
          <p class="text-sm font-semibold text-indigo-600">A few more things about your interview 👇</p>
          <div>
            <label class="label">What company are you interviewing for? <span class="text-gray-400 text-sm">(optional)</span></label>
            <input type="text" name="target_company" placeholder="e.g. Google" class="input" />
          </div>
          <div>
            <label class="label">What's the role? <span class="text-gray-400 text-sm">(optional)</span></label>
            <input type="text" name="role" placeholder="e.g. SWE Intern, Data Analyst" class="input" />
          </div>
          <div>
            <label class="label">What kind of interview do you want to practice? <span class="text-gray-400 text-sm">(optional)</span></label>
            <input type="text" name="focus_area" placeholder="e.g. LeetCode, system design, behavioral" class="input" />
          </div>
          <div>
            <label class="label">Time slot 1 — when can you do the mock as an interviewee? *</label>
            <input type="datetime-local" name="slot_1" class="input" />
          </div>
          <div>
            <label class="label">Time slot 2 — backup slot *</label>
            <input type="datetime-local" name="slot_2" class="input" />
          </div>
          <div>
            <label class="label">Time slot 3 — backup slot *</label>
            <input type="datetime-local" name="slot_3" class="input" />
          </div>
          <div>
            <label class="label">Any preference on your interviewer's cultural background? <span class="text-gray-400 text-sm">(totally optional)</span></label>
            <input type="text" name="pref_interviewer_bg" class="input" />
          </div>
        </div>

        <button type="submit"
          class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition">
          Submit 🚀
        </button>

      </div>

    </form>

    <div id="statusMsg" class="hidden mt-6 p-4 rounded-xl text-center font-medium"></div>

  </div>

  <style>
    .label { display: block; font-size: 0.875rem; font-weight: 500; color: #374151; margin-bottom: 4px; }
    .input { width: 100%; border: 1px solid #d1d5db; border-radius: 0.5rem; padding: 8px 12px; font-size: 0.875rem; outline: none; }
    .input:focus { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
    #stepFields { animation: fadeIn 0.3s ease; }
    #requesterFields { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <script>
    function onIntentChange(isRequester) {
      // Reveal shared fields
      document.getElementById("stepFields").classList.remove("hidden");
      // Show/hide requester-only section
      document.getElementById("requesterFields").classList.toggle("hidden", !isRequester);
    }

    function getChecked(groupId) {
      const boxes = document.querySelectorAll("#" + groupId + " input[type=checkbox]:checked");
      return Array.from(boxes).map(b => b.value).join(",");
    }

    function readFileAsBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result.split(",")[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function showStatus(text, isError) {
      const el = document.getElementById("statusMsg");
      el.classList.remove("hidden");
      el.className = "mt-6 p-4 rounded-xl text-center font-medium " +
        (isError ? "bg-red-50 text-red-700" : "bg-green-50 text-green-700");
      el.textContent = text;
    }

    document.getElementById("campusForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      const form = e.target;
      const btn = form.querySelector("button[type=submit]");

      try {
        const intentEl = form.querySelector("input[name=intent]:checked");
        if (!intentEl) { showStatus("Please let us know what you're here for.", true); return; }
        const isRequester = intentEl.value === "I want a mock interview (and I'll join the interviewer pool)";

        const data = Object.fromEntries(new FormData(form).entries());
        data.intent = intentEl.value;

        // Availability
        data.availability = getChecked("availability_group");
        if (!data.availability) { showStatus("Please pick at least one time you're free to help.", true); return; }

        // Slots
        if (data.slot_1) data.slot_1 = data.slot_1 + ":00-08:00";
        if (data.slot_2) data.slot_2 = data.slot_2 + ":00-08:00";
        if (data.slot_3) data.slot_3 = data.slot_3 + ":00-08:00";

        // CV
        const cvInput = document.getElementById("cv_input");
        data.cv_base64 = cvInput.files.length > 0 ? await readFileAsBase64(cvInput.files[0]) : "";

        btn.disabled = true;
        btn.textContent = "Submitting...";

        const res = await fetch("/api/v1/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });

        if (res.ok) {
          form.classList.add("hidden");
          showStatus(
            isRequester
              ? "You're in the queue — we're finding your best match. Hang tight! 🙌"
              : "You're in the pool! We'll reach out when someone needs you.",
            false
          );
        } else {
          showStatus("Server error (" + res.status + "). Please try again.", true);
          btn.disabled = false;
          btn.textContent = "Submit 🚀";
        }
      } catch (err) {
        showStatus("Could not reach the server: " + err.message, true);
        btn.disabled = false;
        btn.textContent = "Submit 🚀";
      }
    });
  </script>

</body>
</html>
